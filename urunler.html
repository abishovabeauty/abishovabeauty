<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abishova Beauty - Ürünler</title>
<link rel="stylesheet" href="css/style.css">
<style>
  main { padding: 100px 20px 50px; }
  .urun { border:1px solid #ddd; padding:15px; margin:15px 0; border-radius:8px; }
  .urun img { max-width:150px; border-radius:8px; }
  .urun h3 { margin:5px 0; color:#b8860b; }
  .yorumlar { margin-top:10px; }
  .yorum { border-top:1px solid #ddd; padding:5px 0; }
  .urun-btn { margin-top:5px; }
  .fade-in { animation: fadeIn 1s ease-in; }
  @keyframes fadeIn { from {opacity:0;} to{opacity:1;} }
</style>
</head>
<body>
<header>
  <div class="logo">Abishova Beauty</div>
  <div class="scroll-menu" id="scrollMenu">
    <span id="currentPage">Ürünler</span>
    <button class="burger" onclick="toggleScroll()">☰</button>
    <div id="scrollItems" class="scroll-items">
      <button onclick="openPage('index.html')">Ana Sayfa</button>
      <button onclick="openPage('sosyal.html')">Sosyal Medya</button>
      <button onclick="openPage('kampanya.html')">Kampanyalar</button>
      <button onclick="adminLogin()">Admin</button>
    </div>
    <button class="close-scroll" onclick="toggleScroll()">✕</button>
  </div>
</header>

<main id="urunMain" class="fade-in">
  <h1>Ürünlerimiz</h1>
  <div id="urunListesi"></div>
</main>

<script src="js/urunler.js"></script>
<script src="js/main.js"></script>
</body>
</html>

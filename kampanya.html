<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abishova Beauty - Kampanyalar</title>
<link rel="stylesheet" href="css/style.css">
<style>
  main { padding:100px 20px; overflow:hidden; position:relative;}
  .kampanya-container { display:flex; gap:20px; animation: kaydir 20s linear infinite; }
  .kampanya { min-width:200px; border:1px solid #ddd; padding:10px; border-radius:8px; background:#fff;}
  .kampanya img { width:100%; border-radius:8px; }
  .fade-in { animation: fadeIn 1s ease-in; }
  @keyframes fadeIn { from {opacity:0;} to{opacity:1;} }
  @keyframes kaydir { 0% {transform:translateX(100%);} 100% {transform:translateX(-100%);} }
</style>
</head>
<body>
<header>
  <div class="logo">Abishova Beauty</div>
  <div class="scroll-menu" id="scrollMenu">
    <span id="currentPage">Kampanyalar</span>
    <button class="burger" onclick="toggleScroll()">☰</button>
    <div id="scrollItems" class="scroll-items">
      <button onclick="openPage('index.html')">Ana Sayfa</button>
      <button onclick="openPage('sosyal.html')">Sosyal Medya</button>
      <button onclick="openPage('urunler.html')">Ürünler</button>
      <button onclick="adminLogin()">Admin</button>
    </div>
    <button class="close-scroll" onclick="toggleScroll()">✕</button>
  </div>
</header>

<main id="kampanyaMain" class="fade-in">
  <h1>Kampanyalar</h1>
  <div id="kampanyaListesi" class="kampanya-container"></div>
</main>

<script src="js/kampanya.js"></script>
<script src="js/main.js"></script>
</body>
</html>
